<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Padel Club</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guards.js"></script>
    <script>requireNoAuth();</script>
</head>
<body class="auth-page">

    <main class="auth-layout">
        <section class="auth-card">
            <p class="eyebrow">Nuevo usuario</p>
            <h1 class="section-heading">Crear una cuenta</h1>
            <p class="section-lead">Solo te pedimos lo básico para empezar a usar la aplicación.</p>

            <div id="error-message" class="msg msg-error" style="display: none;"></div>
            <div id="success-message" class="msg msg-success" style="display: none;"></div>

            <form id="register-form">
                <div class="field-row">
                    <div>
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div>
                        <label for="apellidos">Apellidos</label>
                        <input type="text" id="apellidos" required>
                    </div>
                </div>

                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="field-row">
                    <div>
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" required>
                    </div>
                    <div>
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>
                    </div>
                </div>

                <button type="submit">Registrarse</button>
            </form>

            <p><a href="index.html">Volver al inicio</a></p>
            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </section>
    </main>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const apellidos = document.getElementById('apellidos').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            try {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
                submitBtn.disabled = true;

                await AuthService.register({
                    nombre,
                    apellidos,
                    email,
                    password,
                    telefono
                });

                successDiv.textContent = '¡Registro exitoso! Redirigiendo al login...';
                successDiv.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1800);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
            }
        });
    </script>

    <footer class="site-footer">
        <div class="site-footer-inner">
            Padel Club - Proyecto PAT | Registro de usuarios
        </div>
    </footer>
</body>
</html>
